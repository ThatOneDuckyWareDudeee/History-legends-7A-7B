<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Biology Chaos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-primary: #050510;
            --accent-color: #38bdf8;
            --panel-bg: rgba(255, 255, 255, 0.05);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-primary);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            touch-action: none;
            color: white;
            user-select: none;
            transition: background-color 0.5s ease;
        }
        
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
        }

        .pointer-events-auto { pointer-events: auto; }
        .hidden { display: none !important; }

        .btn {
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer;
        }
        .btn:hover:not(:disabled) {
            transform: translateY(-2px) scale(1.02);
            filter: brightness(1.1);
        }

        .glow-text {
            text-shadow: 0 0 15px var(--accent-color);
        }

        .shop-item {
            transition: all 0.3s ease;
            border: 2px solid rgba(255,255,255,0.05);
            background: var(--panel-bg);
        }
        .shop-item.equipped { 
            border-color: var(--accent-color); 
            background: rgba(56, 189, 248, 0.1);
        }

        #shopGrid::-webkit-scrollbar { width: 6px; }
        #shopGrid::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }

        @keyframes pulse-slow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }
        .theme-preview {
            width: 100%;
            height: 40px;
            border-radius: 8px;
            margin-bottom: 8px;
        }
    </style>
</head>
<body id="gameBody">

    <canvas id="gameCanvas"></canvas>

    <div id="uiContainer" class="ui-layer">
        
        <!-- HUD -->
        <div id="hud" class="hidden flex flex-col w-full h-full p-4 pointer-events-none">
            <div class="flex justify-between items-start">
                <div class="bg-black/60 backdrop-blur-md p-3 rounded-2xl border border-white/10">
                    <div class="text-xl font-bold text-blue-300">Score: <span id="scoreDisplay" class="text-white">0</span></div>
                    <div class="text-xl font-bold text-yellow-400">Coins: <span id="coinsDisplay" class="text-white">0</span></div>
                    <div id="livesDisplay" class="text-lg font-bold text-red-400 mt-1">❤️❤️❤️</div>
                </div>
                <button id="pauseBtn" class="pointer-events-auto bg-white/10 p-3 rounded-full backdrop-blur-md border border-white/20">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </button>
            </div>
            <div class="mt-4 text-center">
                <div id="questionDisplay" class="text-xl md:text-3xl font-extrabold text-white glow-text inline-block px-8 py-5 bg-black/70 rounded-3xl backdrop-blur-xl border border-white/20 max-w-[90%]">
                    Ready?
                </div>
            </div>
        </div>

        <!-- Main Menu -->
        <div id="mainMenu" class="pointer-events-auto absolute inset-0 flex flex-col items-center justify-center z-50">
            <div class="flex flex-col items-center max-w-lg w-full px-6 text-center">
                <div class="mb-2 px-4 py-1 bg-white/10 border border-white/20 rounded-full text-blue-400 text-xs font-bold tracking-[0.3em] uppercase">Advanced Bio-Logic</div>
                <h1 class="text-6xl md:text-8xl font-black mb-2 text-white glow-text leading-tight tracking-tighter">
                    BIOLOGY<br>CHAOS
                </h1>
                <p class="text-white/60 mb-10 text-lg font-medium">By Mr. Armour & Milad K</p>
                
                <div class="space-y-4 w-full max-w-xs">
                    <button id="playBtn" class="btn w-full py-5 bg-white text-black rounded-2xl font-bold text-xl uppercase tracking-widest shadow-xl">
                        Enter Chaos
                    </button>
                    <button id="shopMenuBtn" class="btn w-full py-4 bg-white/5 hover:bg-white/10 border border-white/10 rounded-2xl font-bold text-lg uppercase tracking-widest text-white">
                        The Shop (<span id="menuCoins">0</span>)
                    </button>
                </div>
            </div>
        </div>

        <!-- Shop -->
        <div id="shopMenu" class="hidden pointer-events-auto absolute inset-0 bg-black/90 backdrop-blur-3xl flex flex-col items-center justify-center z-50 p-6">
            <div class="w-full max-w-5xl flex flex-col h-full max-h-[90vh]">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h2 class="text-5xl font-black text-white italic">RESOURCES</h2>
                        <div class="flex gap-4 mt-4">
                            <button id="tabShips" class="text-lg font-bold border-b-2 border-blue-400 pb-1">SHIPS</button>
                            <button id="tabThemes" class="text-lg font-bold border-b-2 border-transparent text-white/40 pb-1">THEMES</button>
                        </div>
                    </div>
                    <div class="text-2xl font-bold bg-yellow-500/20 text-yellow-400 px-6 py-3 rounded-2xl border border-yellow-500/40">
                        🪙 <span id="shopCoinsDisplay">0</span>
                    </div>
                </div>

                <div id="shopGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4 overflow-y-auto pr-2 pb-6">
                    <!-- Dynamic Content -->
                </div>

                <div class="mt-auto pt-6 flex justify-center">
                    <button id="closeShopBtn" class="btn px-16 py-4 bg-white text-black rounded-full font-bold text-xl uppercase tracking-widest">
                        Save & Exit
                    </button>
                </div>
            </div>
        </div>

        <!-- Game Over -->
        <div id="gameOverMenu" class="hidden pointer-events-auto absolute inset-0 bg-black/80 backdrop-blur-2xl flex flex-col items-center justify-center z-50">
            <div class="flex flex-col items-center max-w-sm w-full p-10">
                <h2 class="text-6xl font-black mb-2 text-red-500 glow-text text-center">FAILED</h2>
                <p class="text-white/40 mb-8 uppercase tracking-[0.2em] text-sm">Study harder, Defender</p>
                
                <div class="w-full bg-white/5 rounded-3xl p-6 mb-8 border border-white/10 text-center">
                    <div class="text-gray-400 text-sm uppercase mb-1">Knowledge Retained</div>
                    <div id="finalScore" class="font-black text-white text-5xl mb-4">0</div>
                    <div class="text-yellow-400 font-bold">🪙 +<span id="finalCoins">0</span></div>
                </div>

                <div class="space-y-3 w-full">
                    <button id="restartBtn" class="btn w-full py-5 bg-white text-black rounded-full font-bold text-lg uppercase tracking-widest">
                        Try Again
                    </button>
                    <button id="menuFromGameOverBtn" class="btn w-full py-4 text-white/60 font-bold uppercase tracking-widest">
                        Main Menu
                    </button>
                </div>
            </div>
        </div>

    </div>

<script>
/**
 * DATA & THEMES
 */
const questionsData = [
    { q: "When did the Big Bang happen?", a: "13.7 billion yrs ago", wrong: ["4.4 billion yrs ago", "3.5 billion yrs ago", "600 million yrs ago"] },
    { q: "When did Earth form?", a: "4.4 billion yrs ago", wrong: ["13.7 billion yrs ago", "3.5 billion yrs ago", "1 million yrs ago"] },
    { q: "What is the smallest living thing?", a: "A cell", wrong: ["An atom", "A virus", "A bacteria"] },
    { q: "Plant cells have chloroplasts and what else?", a: "Cell wall & Vacuole", wrong: ["Nucleus & DNA", "Membrane & Ribosome", "Blood cells"] },
    { q: "What acts as the 'Control Centre' of a cell?", a: "The Nucleus", wrong: ["The Vacuole", "The Chloroplast", "The Cell Wall"] },
    { q: "Who created the 2-name classification system?", a: "Carl Von Linne", wrong: ["Charles Darwin", "Isaac Newton", "Albert Einstein"] },
    { q: "How much DNA do we share with chimpanzees?", a: "98%", wrong: ["50%", "85%", "100%"] },
    { q: "What medicine is used to kill bacteria?", a: "Antibiotics", wrong: ["Vaccines", "Painkillers", "Vitamins"] },
    { q: "What prepares your immune system?", a: "Vaccines", wrong: ["Antibiotics", "Cough Syrup", "Surgery"] },
    { q: "What is the DNA's full name?", a: "Deoxyribonucleic acid", wrong: ["Ribonucleic acid", "Dextrose acid", "Dioxygene acid"] },
    { q: "Which organelle produces energy?", a: "Mitochondria", wrong: ["Ribosomes", "Lysosomes", "Golgi Body"] },
    { q: "Who wrote 'The Origin of Species'?", a: "Charles Darwin", wrong: ["Gregor Mendel", "Lamarck", "Alfred Wallace"] },
    { q: "How many chromosomes do humans have?", a: "46", wrong: ["23", "48", "50"] },
    { q: "Which blood type is the universal donor?", a: "O negative", wrong: ["AB positive", "A negative", "B positive"] },
    { q: "Where in the body is the femur?", a: "The Leg", wrong: ["The Arm", "The Chest", "The Skull"] },
    { q: "What is the gel inside a cell called?", a: "Cytoplasm", wrong: ["Plasma", "Cytoskeleton", "Cell Sap"] }
];

const themes = [
    { id: 'theme_space', name: 'Deep Space', cost: 0, bg: '#050510', accent: '#38bdf8', starColor: '#ffffff', owned: true },
    { id: 'theme_alien', name: 'Alien Invasion', cost: 250, bg: '#0a1a0a', accent: '#4ade80', starColor: '#00ff00', owned: false },
    { id: 'theme_sport', name: 'Supercar', cost: 500, bg: '#1a0a0a', accent: '#ef4444', starColor: '#ff0000', owned: false },
    { id: 'theme_ocean', name: 'Abyss', cost: 750, bg: '#05101a', accent: '#06b6d4', starColor: '#ffffff', owned: false },
    { id: 'theme_retro', name: 'Synthwave', cost: 1000, bg: '#10051a', accent: '#f472b6', starColor: '#f472b6', owned: false },
    { id: 'theme_gold', name: 'Royal Gold', cost: 5000, bg: '#1a1a05', accent: '#fbbf24', starColor: '#fbbf24', owned: false }
];

const shipItems = [
    { id: 'ship_basic', name: 'Interceptor', cost: 0, color: '#ffffff', shape: 'triangle', owned: true },
    { id: 'ship_stealth', name: 'Phantom', cost: 200, color: '#a855f7', shape: 'dart', owned: false },
    { id: 'ship_scout', name: 'Neon Scout', cost: 400, color: '#22c55e', shape: 'hexagon', owned: false },
    { id: 'ship_royal', name: 'Monarch', cost: 800, color: '#fbbf24', shape: 'saucer', owned: false },
    { id: 'ship_void', name: 'Void Walker', cost: 2000, color: '#ec4899', shape: 'dart', owned: false }
];

/**
 * GAME ENGINE
 */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let gameState = 'MENU';
let score = 0, coins = 0, lives = 3, lastTime = 0, difficulty = 1;
let equippedShipId = 'ship_basic';
let equippedThemeId = 'theme_space';
let currentTab = 'SHIPS';
let inputX = window.innerWidth / 2;

// Storage
try {
    const data = JSON.parse(localStorage.getItem('biochaos_save') || '{}');
    coins = data.coins || 0;
    equippedShipId = data.ship || 'ship_basic';
    equippedThemeId = data.theme || 'theme_space';
    if(data.ownedShips) data.ownedShips.forEach(id => { const s = shipItems.find(x => x.id === id); if(s) s.owned = true; });
    if(data.ownedThemes) data.ownedThemes.forEach(id => { const t = themes.find(x => x.id === id); if(t) t.owned = true; });
} catch(e) {}

function save() {
    localStorage.setItem('biochaos_save', JSON.stringify({
        coins, ship: equippedShipId, theme: equippedThemeId,
        ownedShips: shipItems.filter(s => s.owned).map(s => s.id),
        ownedThemes: themes.filter(t => t.owned).map(t => t.id)
    }));
}

const ui = {
    hud: document.getElementById('hud'),
    mainMenu: document.getElementById('mainMenu'),
    shopMenu: document.getElementById('shopMenu'),
    gameOverMenu: document.getElementById('gameOverMenu'),
    score: document.getElementById('scoreDisplay'),
    coins: document.getElementById('coinsDisplay'),
    lives: document.getElementById('livesDisplay'),
    question: document.getElementById('questionDisplay'),
    menuCoins: document.getElementById('menuCoins'),
    shopCoins: document.getElementById('shopCoinsDisplay'),
    finalScore: document.getElementById('finalScore'),
    finalCoins: document.getElementById('finalCoins'),
    shopGrid: document.getElementById('shopGrid')
};

/**
 * CLASSES
 */
class Starfield {
    constructor() { this.stars = []; this.init(); }
    init() {
        this.stars = [];
        const theme = themes.find(t => t.id === equippedThemeId);
        for(let i=0; i<80; i++) {
            this.stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                z: Math.random() * 2,
                speed: 30 + Math.random() * 70,
                color: theme.starColor
            });
        }
    }
    update(dt) {
        const speedBoost = Math.min(score / 400, 3);
        this.stars.forEach(s => {
            s.y += s.speed * dt * (difficulty + speedBoost);
            if(s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; }
        });
    }
    draw(ctx) {
        this.stars.forEach(s => {
            ctx.globalAlpha = 0.1 + (s.z / 2);
            ctx.fillStyle = s.color;
            ctx.beginPath(); ctx.arc(s.x, s.y, s.z, 0, Math.PI*2); ctx.fill();
        });
        ctx.globalAlpha = 1;
    }
}

class Player {
    constructor() { this.size = 35; this.refresh(); }
    refresh() {
        const s = shipItems.find(i => i.id === equippedShipId);
        this.color = s.color; this.shape = s.shape;
        this.x = canvas.width / 2; this.y = canvas.height - 120;
    }
    update(dt) { this.x += (inputX - this.x) * 0.2; }
    draw(ctx) { drawShip(ctx, this.x, this.y, this.size, this.shape, this.color, true); }
}

class Meteor {
    constructor(x, text, isCorrect) {
        this.x = x; this.y = -100; this.text = text; this.isCorrect = isCorrect;
        this.size = Math.min(canvas.width / 4, 85);
        this.speed = (90 + Math.random() * 60) * difficulty;
        this.rot = 0; this.rotSpeed = (Math.random() - 0.5) * 2;
        this.points = Array.from({length: 6}, (_, i) => ({
            x: Math.cos(i/6*Math.PI*2) * this.size * (0.8 + Math.random()*0.3),
            y: Math.sin(i/6*Math.PI*2) * this.size * (0.8 + Math.random()*0.3)
        }));
    }
    update(dt) { this.y += this.speed * dt; this.rot += this.rotSpeed * dt; }
    draw(ctx) {
        ctx.save(); ctx.translate(this.x, this.y);
        ctx.save(); ctx.rotate(this.rot);
        ctx.beginPath(); ctx.moveTo(this.points[0].x, this.points[0].y);
        this.points.forEach(p => ctx.lineTo(p.x, p.y));
        ctx.closePath();
        ctx.fillStyle = '#1a1a2e'; ctx.strokeStyle = themes.find(t => t.id === equippedThemeId).accent;
        ctx.lineWidth = 3; ctx.fill(); ctx.stroke();
        ctx.restore();
        ctx.fillStyle = 'white'; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
        const words = this.text.split(' ');
        let lines = [], c = '';
        words.forEach(w => { if(ctx.measureText(c+w).width > this.size*1.3) { lines.push(c); c=w+' '; } else c+=w+' '; });
        lines.push(c);
        lines.forEach((l, i) => ctx.fillText(l.trim(), 0, (i - (lines.length-1)/2) * 16));
        ctx.restore();
    }
}

class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color; this.life = 1;
        const a = Math.random() * Math.PI*2, s = Math.random()*200;
        this.vx = Math.cos(a)*s; this.vy = Math.sin(a)*s;
    }
    update(dt) { this.x += this.vx*dt; this.y += this.vy*dt; this.life -= dt*2; }
    draw(ctx) { ctx.globalAlpha = Math.max(0, this.life); ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, 3, 0, Math.PI*2); ctx.fill(); }
}

/**
 * UTILS
 */
function drawShip(ctx, x, y, size, shape, color, glow) {
    ctx.save(); ctx.translate(x, y);
    if(glow) { ctx.shadowBlur = 20; ctx.shadowColor = color; }
    ctx.strokeStyle = color; ctx.fillStyle = '#0a0a1a'; ctx.lineWidth = 3; ctx.beginPath();
    if(shape === 'triangle') { ctx.moveTo(0, -size); ctx.lineTo(size, size); ctx.lineTo(0, size*0.5); ctx.lineTo(-size, size); }
    else if(shape === 'dart') { ctx.moveTo(0, -size*1.3); ctx.lineTo(size*0.6, size); ctx.lineTo(0, size*0.5); ctx.lineTo(-size*0.6, size); }
    else if(shape === 'saucer') { ctx.ellipse(0, 0, size, size*0.6, 0, 0, Math.PI*2); }
    else if(shape === 'hexagon') { for(let i=0; i<6; i++) { const a = i/6*Math.PI*2-Math.PI/2; ctx.lineTo(Math.cos(a)*size, Math.sin(a)*size); } }
    ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.restore();
}

/**
 * CORE LOGIC
 */
let starfield, player, meteors = [], particles = [];

function applyTheme() {
    const t = themes.find(x => x.id === equippedThemeId);
    document.body.style.backgroundColor = t.bg;
    document.documentElement.style.setProperty('--bg-primary', t.bg);
    document.documentElement.style.setProperty('--accent-color', t.accent);
    if(starfield) starfield.init();
}

function initShop() {
    ui.shopGrid.innerHTML = '';
    const items = currentTab === 'SHIPS' ? shipItems : themes;
    items.forEach(item => {
        const div = document.createElement('div');
        const isEquipped = item.id === (currentTab === 'SHIPS' ? equippedShipId : equippedThemeId);
        div.className = `shop-item p-4 rounded-3xl flex flex-col items-center text-center ${isEquipped ? 'equipped' : ''}`;
        
        let preview = '';
        if(currentTab === 'SHIPS') {
            preview = `<canvas id="p_${item.id}" width="80" height="80"></canvas>`;
        } else {
            preview = `<div class="theme-preview shadow-lg" style="background: linear-gradient(135deg, ${item.bg}, ${item.accent})"></div>`;
        }

        let btn = '';
        if(isEquipped) btn = `<button disabled class="w-full py-2 bg-blue-500 rounded-xl text-[10px] font-bold uppercase">Equipped</button>`;
        else if(item.owned) btn = `<button onclick="equip('${item.id}')" class="w-full py-2 bg-white/10 rounded-xl text-[10px] font-bold uppercase">Equip</button>`;
        else btn = `<button onclick="buy('${item.id}')" class="w-full py-2 ${coins >= item.cost ? 'bg-yellow-500 text-black' : 'bg-white/5 text-white/20'} rounded-xl text-[10px] font-bold uppercase">${item.cost} 🪙</button>`;

        div.innerHTML = `
            <div class="text-[10px] font-bold uppercase tracking-widest text-white/40 mb-3">${item.name}</div>
            ${preview}
            <div class="mt-4 w-full">${btn}</div>
        `;
        ui.shopGrid.appendChild(div);
        if(currentTab === 'SHIPS') {
            const pctx = document.getElementById(`p_${item.id}`).getContext('2d');
            drawShip(pctx, 40, 40, 20, item.shape, item.color, false);
        }
    });
}

window.buy = (id) => {
    const list = currentTab === 'SHIPS' ? shipItems : themes;
    const item = list.find(i => i.id === id);
    if(item && coins >= item.cost) { coins -= item.cost; item.owned = true; equip(id); }
};

window.equip = (id) => {
    if(currentTab === 'SHIPS') equippedShipId = id; else equippedThemeId = id;
    save(); initShop(); applyTheme(); if(player) player.refresh();
};

function spawnQuestion() {
    if(gameState !== 'PLAYING') return;
    const q = questionsData[Math.floor(Math.random() * questionsData.length)];
    ui.question.innerText = q.q;
    const ans = [{t:q.a,c:1}, {t:q.wrong[0],c:0}, {t:q.wrong[1],c:0}].sort(() => Math.random()-0.5);
    meteors = ans.map((a, i) => new Meteor(canvas.width/3 * i + canvas.width/6, a.t, a.c));
}

function startGame() {
    lives = 3; score = 0; difficulty = 1; meteors = []; particles = [];
    ui.score.innerText = '0'; ui.coins.innerText = coins; ui.lives.innerText = '❤️❤️❤️';
    ui.mainMenu.classList.add('hidden'); ui.gameOverMenu.classList.add('hidden');
    ui.hud.classList.remove('hidden'); player = new Player();
    gameState = 'PLAYING'; spawnQuestion(); applyTheme();
}

function loseLife() {
    lives--; ui.lives.innerText = '❤️'.repeat(lives);
    particles.push(...Array.from({length:20}, () => new Particle(player.x, player.y, '#ef4444')));
    if(lives <= 0) {
        gameState = 'GAMEOVER'; ui.hud.classList.add('hidden');
        ui.gameOverMenu.classList.remove('hidden');
        ui.finalScore.innerText = score; ui.finalCoins.innerText = Math.floor(score/10);
        coins += Math.floor(score/10); save();
    } else { meteors = []; setTimeout(spawnQuestion, 1200); }
}

function loop(time) {
    const dt = (time - lastTime)/1000 || 0; lastTime = time;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if(starfield) { starfield.update(dt); starfield.draw(ctx); }
    if(gameState === 'PLAYING') {
        player.update(dt); player.draw(ctx);
        for(let i=meteors.length-1; i>=0; i--) {
            const m = meteors[i]; m.update(dt); m.draw(ctx);
            if(Math.hypot(m.x-player.x, m.y-player.y) < m.size*0.8 + player.size*0.8) {
                if(m.isCorrect) {
                    score += 100; coins += 5; difficulty += 0.05;
                    ui.score.innerText = score; ui.coins.innerText = coins;
                    particles.push(...Array.from({length:30}, () => new Particle(m.x, m.y, themes.find(t=>t.id===equippedThemeId).accent)));
                    meteors = []; spawnQuestion(); save();
                } else loseLife();
                break;
            }
            if(m.y > canvas.height + m.size) { if(m.isCorrect) loseLife(); meteors.splice(i, 1); if(!meteors.length && lives > 0) spawnQuestion(); }
        }
    }
    for(let i=particles.length-1; i>=0; i--) { particles[i].update(dt); particles[i].draw(ctx); if(particles[i].life <= 0) particles.splice(i,1); }
    requestAnimationFrame(loop);
}

// EVENTS
window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; starfield.init(); });
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
const handleMove = (e) => { inputX = (e.touches ? e.touches[0].clientX : e.clientX); };
window.addEventListener('mousemove', handleMove); window.addEventListener('touchstart', handleMove); window.addEventListener('touchmove', handleMove);

document.getElementById('playBtn').onclick = startGame;
document.getElementById('shopMenuBtn').onclick = () => { ui.mainMenu.classList.add('hidden'); ui.shopMenu.classList.remove('hidden'); ui.shopCoins.innerText = coins; initShop(); };
document.getElementById('closeShopBtn').onclick = () => { ui.shopMenu.classList.add('hidden'); ui.mainMenu.classList.remove('hidden'); ui.menuCoins.innerText = coins; };
document.getElementById('pauseBtn').onclick = () => { gameState = 'MENU'; ui.hud.classList.add('hidden'); ui.mainMenu.classList.remove('hidden'); ui.menuCoins.innerText = coins; };
document.getElementById('restartBtn').onclick = startGame;
document.getElementById('menuFromGameOverBtn').onclick = () => { ui.gameOverMenu.classList.add('hidden'); ui.mainMenu.classList.remove('hidden'); ui.menuCoins.innerText = coins; };

document.getElementById('tabShips').onclick = (e) => { currentTab = 'SHIPS'; document.getElementById('tabThemes').className = 'text-lg font-bold border-b-2 border-transparent text-white/40 pb-1'; e.target.className = 'text-lg font-bold border-b-2 border-blue-400 pb-1'; initShop(); };
document.getElementById('tabThemes').onclick = (e) => { currentTab = 'THEMES'; document.getElementById('tabShips').className = 'text-lg font-bold border-b-2 border-transparent text-white/40 pb-1'; e.target.className = 'text-lg font-bold border-b-2 border-blue-400 pb-1'; initShop(); };

ui.menuCoins.innerText = coins;
starfield = new Starfield();
applyTheme();
requestAnimationFrame(loop);

</script>
</body>
</html>
